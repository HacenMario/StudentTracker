<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع التلاميذ - نظام احترافي</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <div class="container">
            <header>
                <h1><span>🏫</span> نظام الحضور المدرسي</h1>
                <span class="live-badge">🟢 مباشر</span>
            </header>

            <div class="add-section">
                <input type="text" id="studentNameInput" placeholder="أدخل اسم التلميذ الجديد...">
                <button id="addBtn">إضافة <i class="fas fa-plus"></i></button>
            </div>

            <div id="studentsContainer" class="students-grid">
                <div class="loading-state">جاري تحميل البيانات...</div>
            </div>

            <div class="log-section">
                <h3>📋 آخر النشاطات</h3>
                <div id="logContainer"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
