<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور المدرسي - متكامل</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <div class="container" id="appContainer">
            <!-- شاشة تسجيل الدخول -->
            <div id="loginScreen">
                <h2>🔐 تسجيل الدخول</h2>
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
                <input type="password" id="loginPassword" placeholder="كلمة المرور">
                <button id="loginBtn">دخول</button>
                <p>ليس لديك حساب؟ <a href="#" id="showRegister">سجل الآن</a></p>
            </div>

            <!-- شاشة التسجيل -->
            <div id="registerScreen" style="display:none;">
                <h2>📝 إنشاء حساب</h2>
                <input type="text" id="regName" placeholder="الاسم الكامل">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
                <input type="password" id="regPassword" placeholder="كلمة المرور (6 أحرف على الأقل)">
                <input type="text" id="regPhone" placeholder="رقم الهاتف">
                <select id="regRole">
                    <option value="parent">ولي أمر</option>
                    <option value="admin">مدير/موظف</option>
                </select>
                <button id="registerBtn">تسجيل</button>
                <p>لديك حساب؟ <a href="#" id="showLogin">سجل دخول</a></p>
            </div>

            <!-- لوحة المدير -->
            <div id="adminDashboard" style="display:none;">
                <header>
                    <h1>🏫 لوحة المدير</h1>
                    <span class="live-badge">🟢 مباشر</span>
                    <button id="logoutBtnAdmin" style="background:#f0f0f0;border:none;padding:6px 16px;border-radius:20px;cursor:pointer;">🚪 خروج</button>
                </header>

                <div class="add-section" style="flex-wrap:wrap; gap:8px;">
                    <input type="text" id="adminStudentName" placeholder="اسم التلميذ" style="flex:1; min-width:140px;">
                    <input type="email" id="adminParentEmail" placeholder="بريد ولي الأمر" style="flex:1; min-width:140px;">
                    <input type="text" id="adminParentName" placeholder="اسم ولي الأمر" style="flex:1; min-width:140px;">
                    <input type="text" id="adminParentPhone" placeholder="هاتف ولي الأمر" style="flex:1; min-width:140px;">
                    <input type="text" id="adminAddress" placeholder="العنوان" style="flex:1; min-width:140px;">
                    <button id="adminAddBtn" style="padding: 12px 24px;">إضافة طالب</button>
                </div>

                <div id="adminStudentsList" class="students-grid"></div>

                <div class="log-section">
                    <h3>📋 سجل النشاطات</h3>
                    <div id="adminLogContainer"></div>
                </div>

                <!-- إرسال إشعار عام -->
                <div style="margin-top:20px; border-top:2px solid #e2eaf2; padding-top:20px;">
                    <h4>📢 إرسال إشعار عام لجميع أولياء الأمور</h4>
                    <textarea id="adminNotificationMsg" placeholder="اكتب رسالة الإشعار العام..." style="width:100%; padding:12px; border-radius:16px; border:2px solid #e2eaf2; min-height:60px; font-family: 'Tajawal', sans-serif;"></textarea>
                    <button id="adminSendNotificationBtn" style="background:#e67e22; color:white; border:none; padding:10px 24px; border-radius:60px; font-weight:700; cursor:pointer; margin-top:8px;">إرسال الإشعار العام</button>
                </div>

                <!-- إرسال إشعار خاص لولي أمر -->
                <div style="margin-top:20px; border-top:2px solid #e2eaf2; padding-top:20px;">
                    <h4>📩 إرسال إشعار لولي أمر معين</h4>
                    <input type="email" id="adminParentEmailInput" placeholder="بريد ولي الأمر المستهدف" style="width:100%; padding:12px; border-radius:16px; border:2px solid #e2eaf2; margin-bottom:10px; font-family: 'Tajawal', sans-serif;">
                    <textarea id="adminParentNotificationMsg" placeholder="اكتب رسالة الإشعار الخاص..." style="width:100%; padding:12px; border-radius:16px; border:2px solid #e2eaf2; min-height:60px; font-family: 'Tajawal', sans-serif;"></textarea>
                    <button id="adminSendParentNotificationBtn" style="background:#2ecc71; color:white; border:none; padding:10px 24px; border-radius:60px; font-weight:700; cursor:pointer; margin-top:8px;">إرسال الإشعار لولي الأمر</button>
                </div>
            </div>

            <!-- لوحة ولي الأمر -->
            <div id="parentDashboard" style="display:none;">
                <header>
                    <h1>🏫 لوحة ولي الأمر</h1>
                    <span class="live-badge">🟢 مباشر</span>
                    <button id="logoutBtnParent" style="background:#f0f0f0;border:none;padding:6px 16px;border-radius:20px;cursor:pointer;">🚪 خروج</button>
                </header>

                <div id="parentStudentsList" class="students-grid"></div>

                <div class="log-section">
                    <h3>📋 سجل دخول/خروج أبنائي</h3>
                    <div id="parentLogContainer"></div>
                </div>

                <!-- استقبال الإشعارات -->
                <div id="notificationContainer" style="margin-top:20px; background:#f0f8ff; padding:15px; border-radius:20px; border:1px solid #d6e8f5;">
                    <h4>📩 الإشعارات الواردة</h4>
                    <ul id="notificationList" style="list-style:none; padding:0; margin:0;"></ul>
                        <!-- زر عرض الإشعارات القديمة -->
    <button id="showOldNotificationsBtn" style="display:none; margin-top:10px; background:#e2eaf2; border:none; padding:8px 20px; border-radius:40px; cursor:pointer; font-family: 'Tajawal', sans-serif; font-weight:600;">
        📜 عرض الإشعارات القديمة
    </button>
    <button id="hideOldNotificationsBtn" style="display:none; margin-top:10px; background:#e2eaf2; border:none; padding:8px 20px; border-radius:40px; cursor:pointer; font-family: 'Tajawal', sans-serif; font-weight:600;">
        🔼 إخفاء الإشعارات القديمة
    </button>
</div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
