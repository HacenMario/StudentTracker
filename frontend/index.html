<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحضور المدرسي - احترافي</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <div class="container">
            <header>
                <h1><span>🏫</span> نظام الحضور المدرسي</h1>
                <span class="live-badge">🟢 مباشر</span>
            </header>

            <!-- نموذج إضافة طالب (موسع) -->
            <div class="add-section">
                <div class="form-grid">
                    <input type="text" id="studentName" placeholder="اسم التلميذ *">
                    <input type="text" id="parentName" placeholder="اسم ولي الأمر *">
                    <input type="tel" id="phone" placeholder="رقم الهاتف *">
                    <input type="text" id="address" placeholder="العنوان *">
                    <input type="email" id="email" placeholder="البريد الإلكتروني *">
                </div>
                <button id="addBtn">إضافة <i class="fas fa-plus"></i></button>
            </div>

            <!-- قائمة التلاميذ -->
            <div id="studentsContainer" class="students-grid">
                <div class="loading-state">جاري تحميل البيانات...</div>
            </div>

            <!-- سجل النشاطات -->
            <div class="log-section">
                <h3>📋 آخر النشاطات</h3>
                <div id="logContainer"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
